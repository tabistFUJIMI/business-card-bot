<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>佐野 弘明</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="googlebot" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0c0c1d;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-glass: rgba(255, 255, 255, 0.06);
      --border-glass: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f0f5;
      --text-secondary: #9494b8;
      --text-muted: #6a6a8a;
      --accent: #c5a05e;
      --accent-glow: rgba(197, 160, 94, 0.15);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100dvh;
      background: var(--bg-primary);
      font-family: "Zen Kaku Gothic New", "Noto Sans JP", sans-serif;
      color: var(--text-primary);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 0;
      overflow-x: hidden;
    }

    /* 背景のアンビエントライト */
    body::before {
      content: "";
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(197, 160, 94, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      bottom: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(100, 120, 180, 0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      width: 100%;
      max-width: 400px;
      min-height: 100dvh;
      position: relative;
      z-index: 1;
      padding: 3rem 1.25rem 2.5rem;
    }

    /* ── ヘッダー ── */
    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .avatar-ring {
      width: 96px;
      height: 96px;
      margin: 0 auto 1.25rem;
      border-radius: 50%;
      padding: 3px;
      background: linear-gradient(135deg, var(--accent), #7a6535);
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar svg {
      width: 40px;
      height: 40px;
      opacity: 0.7;
    }

    .name-ja {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .name-en {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .title-block {
      display: inline-flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .company-name {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.08em;
    }

    .position {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: var(--accent);
      margin: 1.25rem auto;
      opacity: 0.5;
    }

    .catchphrase {
      font-size: 0.8rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    /* ── リンクカード ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 2.5rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--bg-glass);
      border: 1px solid var(--border-glass);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .link-card:active {
      transform: scale(0.97);
      background: rgba(255, 255, 255, 0.09);
    }

    @media (hover: hover) {
      .link-card:hover {
        background: rgba(255, 255, 255, 0.09);
        border-color: rgba(255, 255, 255, 0.14);
        transform: translateY(-1px);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      }
    }

    .link-icon {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-icon svg {
      width: 20px;
      height: 20px;
    }

    .icon-website { background: linear-gradient(135deg, #2d6a9f, #1a4670); }
    .icon-website svg { color: #7ab8e8; }

    .icon-ig-personal { background: linear-gradient(135deg, #e1306c, #c13584, #833ab4); }
    .icon-ig-personal svg { color: #fff; }

    .icon-ig-inn { background: linear-gradient(135deg, #f77737, #fd1d1d, #c13584); }
    .icon-ig-inn svg { color: #fff; }

    .icon-line { background: #06c755; }
    .icon-line svg { color: #fff; }

    .icon-phone { background: linear-gradient(135deg, #34c759, #248a3d); }
    .icon-phone svg { color: #fff; }

    .icon-email { background: linear-gradient(135deg, #5e7ce2, #3d5afe); }
    .icon-email svg { color: #fff; }

    .icon-map { background: linear-gradient(135deg, #ea4335, #c5221f); }
    .icon-map svg { color: #fff; }

    .link-body {
      flex: 1;
      min-width: 0;
    }

    .link-label {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .link-sub {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .link-chevron {
      flex-shrink: 0;
      opacity: 0.25;
      transition: opacity 0.2s;
    }

    .link-chevron svg {
      width: 16px;
      height: 16px;
    }

    .link-card:hover .link-chevron,
    .link-card:active .link-chevron {
      opacity: 0.5;
    }

    /* ── フッター ── */
    .footer {
      text-align: center;
      padding-top: 0;
    }

    .footer-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-glass), transparent);
      margin-bottom: 1.5rem;
    }

    .address-line {
      font-size: 0.7rem;
      color: var(--text-muted);
      line-height: 1.8;
      letter-spacing: 0.04em;
    }

    /* ── アニメーション ── */
    .header,
    .link-card,
    .footer {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    .header { animation-delay: 0.1s; }
    .link-card:nth-child(1) { animation-delay: 0.2s; }
    .link-card:nth-child(2) { animation-delay: 0.26s; }
    .link-card:nth-child(3) { animation-delay: 0.32s; }
    .link-card:nth-child(4) { animation-delay: 0.38s; }
    .link-card:nth-child(5) { animation-delay: 0.44s; }
    .link-card:nth-child(6) { animation-delay: 0.50s; }
    .link-card:nth-child(7) { animation-delay: 0.56s; }
    .footer { animation-delay: 0.65s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
