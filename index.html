<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI筆書き | Under Construction</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .title-ja {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #ffffff;
    }

    .title-en {
      font-size: 1.1rem;
      font-weight: 400;
      color: #8888aa;
      margin-bottom: 2rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: #4a4a6a;
      margin: 0 auto 2rem;
    }

    .message-ja {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      color: #ccccdd;
    }

    .message-en {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #8888aa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🖌️</div>
    <div class="title-ja">現在準備中です</div>
    <div class="title-en">Under Construction</div>
    <div class="divider"></div>
    <p class="message-ja">
      AI筆書きサービスは現在メンテナンス中です。<br>
      準備が整い次第、公開いたします。<br>
      しばらくお待ちください。
    </p>
    <p class="message-en">
      The AI Calligraphy service is currently under maintenance.<br>
      We will launch as soon as it's ready.<br>
      Thank you for your patience.
    </p>
  </div>
</body>
</html>
